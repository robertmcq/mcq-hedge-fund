name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Type-check, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  # ──────────────────────────────────────────────────────────────────────────
  validate-replay:
    name: Seed ledger & validate replay engine
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mcq_user
          POSTGRES_PASSWORD: ci_password_123
          POSTGRES_DB: mcq_fund
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build (compile src/ → dist/)
        run: npm run build

      - name: Apply schema
        run: |
          PGPASSWORD=ci_password_123 psql \
            -h localhost -U mcq_user -d mcq_fund \
            -f src/db/schema.sql

      - name: Seed ledger
        run: node dist/scripts/seed-portfolio.js
        env:
          DATABASE_URL: postgresql://mcq_user:ci_password_123@localhost:5432/mcq_fund
          H0: '0.01'
          BETA_G: '1.5'
          BETA_VELOCITY: '0.8'
          BETA_VOLUME: '0.5'
          BETA_SHADOW: '1.2'
          FRACTIONAL_KELLY: '0.25'

      - name: Validate replay engine
        run: node dist/scripts/validate-replay.js
        env:
          DATABASE_URL: postgresql://mcq_user:ci_password_123@localhost:5432/mcq_fund
          H0: '0.01'
          BETA_G: '1.5'
          BETA_VELOCITY: '0.8'
          BETA_VOLUME: '0.5'
          BETA_SHADOW: '1.2'
          FRACTIONAL_KELLY: '0.25'
          HORIZON_DAYS: '252'
          WIN_RATE: '0.55'
          AVG_WIN: '1.8'
          AVG_LOSS: '1.0'
          ENFORCE_LOSS: '0.5'
          ACCOUNT_EQUITY: '1000000'

  # ──────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker build & health smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --target runner -t mcq-hedge-fund:ci .

      - name: Write .env.ci
        run: |
          cat > .env.ci <<'EOF'
POSTGRES_PASSWORD=ci_password_123
KALSHI_BASE_URL=https://external-api.demo.kalshi.co
KALSHI_WS_URL=wss://external-api-ws.demo.kalshi.co/trade-api/ws/v2
KALSHI_API_KEY_ID=ci-dummy
KALSHI_PRIVATE_KEY_PEM=
KALSHI_KEY_FILE=/dev/null
EOF

      - name: Start stack (Postgres + API)
        run: docker compose --env-file .env.ci up -d

      - name: Wait for API to become healthy
        run: |
          echo "Waiting 10s for containers to initialise..."
          sleep 10
          for i in $(seq 1 24); do
            HTTP=$(curl -s -o /tmp/health.json -w "%{http_code}" http://localhost:3000/api/health || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "API healthy after ${i} attempts (HTTP 200)"
              cat /tmp/health.json
              exit 0
            fi
            echo "Attempt ${i}: HTTP=${HTTP}, waiting 5s..."
            sleep 5
          done
          echo "=== API never became healthy ==="
          docker compose logs api
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ──────────────────────────────────────────────────────────────────────────
  docker-push:
    name: Push to GitHub Container Registry
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
